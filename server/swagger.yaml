            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price_per_night]
              properties:
                price_per_night:
                  type: integer
                  example: 5000
                weekend_price:
                  type: integer
                  example: 6500
                minimum_night_stay:
                  type: integer
                  default: 1
                maximum_night_stay:
                  type: integer
                  default: 365
                cleaning_fee:
                  type: integer
                  default: 0
                security_deposit:
                  type: integer
                  default: 0
      responses:
        '200':
          description: Pricing updated
        '400':
          description: Invalid price
        '403':
          description: Unauthorized

  /v1/listings/{id}/promotions:
    post:
      summary: Create a discount promotion
      tags: [Host Listings Config]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  example: "SUMMER20"
                discount_percent:
                  type: integer
                  example: 20
