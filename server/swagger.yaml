            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Notification marked read

  /v1/listings/{id}/pricing:
    patch:
      summary: Update listing pricing
      tags: [Host Listings Config]
      parameters:
        - in: path
          name: id
          required: true
