      tags: [Host Finances]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Total earnings and monthly breakdown

  /v1/host/payouts/request:
    post:
      summary: Request a payout
      tags: [Host Finances]
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  example: 25000
                method:
                  type: string
                  enum: [bank_transfer, esewa, khalti]
                  example: "bank_transfer"
      responses:
        '200':
          description: Payout request submitted

  /v1/host/property-verification/{listingId}:
    post:
      summary: Submit KYC documents for property verification
      tags: [Host KYC]
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                ownership_type:
                  type: string
                  example: "owner"
                ward_number:
                  type: string
                municipality:
                  type: string
                province:
                  type: string
                district:
                  type: string
                property_reg_number:
                  type: string
                notes:
                  type: string
                ownership_certificate:
                  type: string
                  format: binary
                citizenship_front:
                  type: string
                  format: binary
                citizenship_back:
                  type: string
                  format: binary
      responses:
        '201':
          description: Documents submitted for review
        '403':
          description: Not the listing owner
    get:
      summary: Get property verification status
      tags: [Host KYC]
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification status
        '404':
          description: No verification found

  /v1/admin/dashboard:
    get:
      summary: Platform analytics (GMV, users, listings, KYC)
      tags: [Admin Dashboard]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Aggregate statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total_gmv:
                        type: integer
                      total_users:
                        type: integer
                      total_hosts:
                        type: integer
                      total_listings:
                        type: integer
                      published_listings:
                        type: integer
                      pending_kyc:
                        type: integer

  /v1/admin/kyc/pending:
    get:
      summary: List pending KYC submissions
      tags: [Admin KYC]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Pending verifications

  /v1/admin/kyc/{id}/approve:
    patch:
      summary: Approve KYC submission
      tags: [Admin KYC]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: KYC approved, host verified

  /v1/admin/kyc/{id}/reject:
    patch:
      summary: Reject KYC submission
      tags: [Admin KYC]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Documents blurry, re-upload."
      responses:
        '200':
          description: KYC rejected

  /v1/admin/users:
    get:
      summary: List all platform users
      tags: [Admin Management]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [user, host, admin]
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated user list

  /v1/admin/disputes:
    get:
      summary: List all open disputes
      tags: [Admin Operations]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, resolved, escalated]
      responses:
        '200':
          description: List of disputes

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token required for protected endpoints

