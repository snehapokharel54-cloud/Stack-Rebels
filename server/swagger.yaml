                  type: string
                  format: date
      responses:
        '200':
          description: Promotion created

  /v1/listings/{id}/calendar:
    get:
      summary: Full calendar view (booked + blocked dates)
      tags: [Host Calendar]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: month
          schema:
            type: string
          description: "YYYY-MM format"
          example: "2025-07"
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Calendar data
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing_id:
                    type: string
                  month:
                    type: string
                  booked_ranges:
                    type: array
                    items:
                      type: object
                      properties:
                        check_in:
                          type: string
                          format: date
                        check_out:
                          type: string
                          format: date
                  blocked_ranges:
                    type: array
                    items:
                      type: object
                      properties:
                        from_date:
                          type: string
                          format: date
                        to_date:
                          type: string
                          format: date

  /v1/listings/{id}/availability/block:
    post:
      summary: Block dates on calendar
      tags: [Host Calendar]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from:
                  type: string
                  format: date
                  example: "2025-08-01"
                to:
                  type: string
                  format: date
                  example: "2025-08-05"
                reason:
                  type: string
                  example: "Personal use"
      responses:
        '201':
          description: Dates blocked

  /v1/host/earnings:
    get:
