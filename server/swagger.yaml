        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Dream Nepal Stays"
      responses:
        '201':
          description: Wishlist created
    get:
      summary: Get all user wishlists
      tags: [Wishlists]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of wishlists with cover image and count

  /v1/wishlists/{id}:
    delete:
      summary: Delete a wishlist
      tags: [Wishlists]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Wishlist deleted

  /v1/wishlists/{id}/listings/{listingId}:
    post:
      summary: Add listing to wishlist
      tags: [Wishlists]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: listingId
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Listing added to wishlist
    delete:
      summary: Remove listing from wishlist
      tags: [Wishlists]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: listingId
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Listing removed

  /v1/reviews:
    post:
      summary: Guest submits review after checkout
      tags: [Reviews]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id, rating]
              properties:
                booking_id:
                  type: string
                  format: uuid
                rating:
                  type: number
                  minimum: 1
                  maximum: 5
                  example: 4.5
                comment:
                  type: string
                  example: "Great stay! Beautiful views."
      responses:
        '201':
          description: Review created
        '400':
          description: Already reviewed or booking not completed

  /v1/reviews/listings/{id}:
    get:
      summary: Public reviews for a listing
      tags: [Reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Reviews with aggregate category averages

  /v1/reviews/received:
    get:
      summary: All reviews host received
      tags: [Host Reviews]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of reviews across all host listings

  /v1/reviews/{id}/reply:
    post:
      summary: Host replies to a review
      tags: [Host Reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reply]
              properties:
                reply:
                  type: string
                  example: "Thank you! Hope to host you again."
      responses:
        '200':
          description: Reply added
        '400':
          description: Already replied

  /v1/payments/create-intent:
    post:
      summary: Create Stripe PaymentIntent for booking
      tags: [Payments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id]
              properties:
                booking_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Returns payment_url for Stripe Checkout redirect
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment_url:
                    type: string
                  sessionId:
                    type: string
                  amount:
                    type: object
                    properties:
                      npr:
                        type: integer
                      usd_cents:
                        type: integer
                      usd_display:
                        type: string
                        example: "$15.60"
        '400':
          description: Already paid or invalid total
        '404':
          description: Booking not found

  /v1/payments/khalti/create-intent:
    post:
      summary: Create Khalti ePayment intent for booking
      tags: [Payments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id]
              properties:
                booking_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Returns payment_url and pidx for Khalti redirect
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment_url:
                    type: string
                  pidx:
                    type: string
                  amount:
                    type: object
                    properties:
                      npr:
                        type: integer
        '400':
          description: Already paid or invalid total
        '404':
          description: Booking not found

  /v1/payments/khalti/verify:
    post:
      summary: Verify payment after Khalti callback
      tags: [Payments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id, pidx]
              properties:
                booking_id:
                  type: string
                  format: uuid
                pidx:
                  type: string
                  example: "x4H7C5..."
      responses:
        '200':
          description: Khalti Payment verified, booking confirmed
        '400':
          description: Payment not completed

  /v1/payments/verify:
    post:
      summary: Verify payment after Stripe confirmation
      tags: [Payments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id, payment_intent_id]
              properties:
                booking_id:
                  type: string
                  format: uuid
                payment_intent_id:
                  type: string
                  example: "pi_3ABC..."
      responses:
        '200':
          description: Payment verified, booking confirmed
        '400':
          description: Payment not completed

  /v1/payments/history:
    get:
      summary: User payment history
      tags: [Payments]
      security:
        - BearerAuth: []
