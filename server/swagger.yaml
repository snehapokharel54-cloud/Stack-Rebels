          application/json:
            schema:
              type: object
              required: [host_id]
              properties:
                host_id:
                  type: string
                  format: uuid
                listing_id:
                  type: string
                  format: uuid
                message:
                  type: string
                  example: "Hi! Is your place available?"
      responses:
        '200':
          description: Conversation created
    get:
      summary: List all conversations
      tags: [Messaging]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of conversations

  /v1/conversations/{id}/messages:
    get:
      summary: Get messages in thread
      tags: [Messaging]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Messages array
    post:
      summary: Send a message
      tags: [Messaging]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
